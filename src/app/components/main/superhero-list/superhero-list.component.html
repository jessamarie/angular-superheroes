@if (searchTerm() && filteredSuperheroes().length === 0) {
  <p class="no-results">No heroes match "{{ searchTerm() }}".</p>
}

<ul class="superheroes">
  @for (superhero of filteredSuperheroes(); track superhero.id) {
    <li class="superhero affil-border d-flex flex-column justify-content-center align-items-center"
      [class]="getAffiliationClass(superhero)"
      (mouseenter)="selectSuperhero(superhero)"
      (mouseleave)="unselectSuperhero()">
      <h2 class="superhero-name">{{ superhero.name }}</h2>
      <p class="superhero-number">{{ superhero.phoneNumber }}</p>

      @if (superhero === selectedHero) {
        <app-superhero-details [superhero]="superhero"></app-superhero-details>
      }
    </li>
  }

  <li class="add-superhero-cell">
    <app-create-superhero (created)="onCreated($event)"></app-create-superhero>
  </li>
</ul>
