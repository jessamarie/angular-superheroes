<div class="create-superhero-container">
  <button type="button" class="add-toggle" (click)="toggle()">
    <span class="add-plus" aria-hidden="true">+</span>
    <span>Add Superhero</span>
  </button>

  @if (open()) {
    <app-superhero-container>
      <app-edit-superhero (saved)="onSaved($event)" (cancelled)="cancel()"></app-edit-superhero>
    </app-superhero-container>
  }
</div>
